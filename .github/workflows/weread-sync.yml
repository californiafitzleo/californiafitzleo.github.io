name: Weread Sync

on:
  schedule:
    # 每天凌晨 3 点运行（UTC 时间 19:00，对应北京时间 03:00）
    - cron: '0 19 * * *'
  workflow_dispatch:
    # 支持手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: source
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run weread sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          WEREAD_HIGHLIGHTS_DB_ID: ${{ secrets.WEREAD_HIGHLIGHTS_DB_ID }}
          WEREAD_BOOKS_DB_ID: ${{ secrets.WEREAD_BOOKS_DB_ID }}
        run: npm run weread-sync

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code source/_posts/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add source/_posts/
          git commit -m "docs: sync weread highlights"
          git push origin source