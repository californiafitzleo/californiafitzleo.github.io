name: Weread Sync

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: source
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run weread sync
        env:
          WEREAD_STORAGE: ${{ secrets.WEREAD_STORAGE }}
        run: |
          echo "$WEREAD_STORAGE" > source/_data/weread-storage.json
          npm run weread-sync

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code source/_posts/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add source/_posts/
          git commit -m "docs: sync weread highlights"
          git push origin source
